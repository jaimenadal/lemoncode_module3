apiVersion: v1
kind: Service
metadata:
  name: todo-api-service
  labels:
    app: todo-distributed
    component: api
spec:
  type: ClusterIP    # accesible solo internamente; el Ingress enruta /api hacia aquí
  selector:
    app: todo-distributed
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
