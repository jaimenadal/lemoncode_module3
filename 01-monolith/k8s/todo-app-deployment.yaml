apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  labels:
    app: todo-app
    component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
      component: app
  template:
    metadata:
      labels:
        app: todo-app
        component: app
    spec:
      containers:
        - name: todo-app
          image: lemoncodersbc/lc-todo-monolith-db:v5-2024
          ports:
            - containerPort: 3000
          # Inyectamos TODAS las variables desde el ConfigMap
          envFrom:
            - configMapRef:
                name: todo-app-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
