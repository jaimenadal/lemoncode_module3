apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: todo-storage-class
  labels:
    app: todo-app
# Minikube incluye el provisioner 'k8s.io/minikube-hostpath' por defecto,
# lo que permite aprovisionamiento dinámico sin configuración adicional.
provisioner: k8s.io/minikube-hostpath
reclaimPolicy: Retain       # el PV persiste aunque se elimine el PVC
volumeBindingMode: Immediate
